
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap">
<style>
  html,body{margin:0;background:transparent;color:var(--site-fg);}
  body{padding:24px;}
  .card{background:#0a0a0a;border-radius:14px;padding:24px;color:var(--site-fg);}
  .card.beige{background:var(--color-beige);color:var(--primary-800);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:12px;}
  .grow{flex:1;}
  .mono{font-family:var(--font-mono);font-size:12px;letter-spacing:-0.01em;}
  .label{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--secondary-500);}
</style></head><body><style>
    .lwm{display:inline-flex;align-items:center;color:#FFEAE1;font:800 1em var(--font-primary);letter-spacing:.04em;line-height:1;}
    .lwm-b{background:currentColor;position:relative;flex-shrink:0;}
    .lwm-b::before,.lwm-b::after{content:'';position:absolute;background:currentColor;}
    .lwm-bl::before{top:0;left:0;} .lwm-bl::after{bottom:0;left:0;}
    .lwm-br::before{top:0;right:0;} .lwm-br::after{bottom:0;right:0;}
  </style>
  <div class="card" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;">
    <span class="lwm" style="font-size:40px;">
      <span class="lwm-b lwm-bl" style="width:13px;height:56px;"><span style="display:block;"></span></span><style>.lwm-b.lwm-bl::before,.lwm-b.lwm-bl::after{height:6px;width:22px;}.lwm-b.lwm-br::before,.lwm-b.lwm-br::after{height:6px;width:22px;}</style>
      <span style="padding:0 6px;">FOUNDATION</span>
      <span class="lwm-b lwm-br" style="width:13px;height:56px;"></span>
    </span>
    <span class="lwm" style="font-size:18px;">
      <span class="lwm-b lwm-bl" style="width:6px;height:26px;"></span>
      <span style="padding:0 3px;">FOUNDATION</span>
      <span class="lwm-b lwm-br" style="width:6px;height:26px;"></span>
    </span>
    <div class="mono" style="color:rgba(255,234,225,.5);font-size:11px;">Brackets are part of the lockup. Never set in body type.</div>
  </div></body></html>
