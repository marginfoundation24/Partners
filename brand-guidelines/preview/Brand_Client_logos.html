<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:transparent;color:var(--site-fg);}
  body{padding:24px;}
  .card{background:#000;border-radius:14px;padding:32px 24px;}
  .label{font:500 12px/140% var(--font-primary);letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,234,225,.5);margin-bottom:20px;}
  .row{display:flex;gap:48px;align-items:center;flex-wrap:wrap;row-gap:28px;justify-content:center;}
  .row img{opacity:.86;display:block;}
</style></head><body>
<div class="card">
  <div class="label">Foundation clients · marquee</div>
  <div class="row">
    <img src="../assets/clients/snowflake.svg" style="height:24px;" alt="Snowflake" />
    <img src="../assets/clients/canva.svg" style="height:32px;" alt="Canva" />
    <img src="../assets/clients/mailchimp.svg" style="height:24px;" alt="Mailchimp" />
    <img src="../assets/clients/procore.svg" style="height:14px;" alt="Procore" />
    <img src="../assets/clients/webex.svg" style="height:22px;" alt="Webex" />
    <img src="../assets/clients/paychex.svg" style="height:18px;" alt="Paychex" />
    <img src="../assets/clients/rockwell.svg" style="height:24px;" alt="Rockwell" />
    <img src="../assets/clients/bitly.svg" style="height:28px;" alt="Bitly" />
    <img src="../assets/clients/tidio.svg" style="height:28px;" alt="Tidio" />
    <img src="../assets/clients/flourish.svg" style="height:26px;" alt="Flourish" />
    <img src="../assets/clients/stat.svg" style="height:26px;" alt="STAT" />
    <img src="../assets/clients/bx.svg" style="height:22px;" alt="Buildxact" />
  </div>
</div>
</body></html>
