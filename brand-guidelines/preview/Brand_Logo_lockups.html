
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:transparent;}
  body{padding:24px;color:var(--fg-1);}
  .card{background:var(--primary-700);border-radius:14px;padding:24px;}
  .card.light{background:var(--neutral-50);color:var(--primary-800);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:12px;}
  .grow{flex:1;}
  .mono{font-family:var(--font-mono);font-size:12px;letter-spacing:-0.01em;}
  .label{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--neutral-300);}
  .swatch{border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;}
  .pad{padding:24px;}
  .grid{display:grid;gap:8px;}
</style></head><body><div class="row" style="gap:14px;">
    <div style="flex:1;background:var(--primary-800);border-radius:14px;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;height:140px;">
      <img src="../assets/logo-wordmark-light.png" style="max-height:26px;" alt="Foundation" />
      <img src="../assets/logo-brandmark-light.png" style="max-height:36px;" alt="Foundation brandmark" />
    </div>
    <div style="flex:1;background:var(--neutral-50);border-radius:14px;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;height:140px;">
      <img src="../assets/logo-wordmark-dark.png" style="max-height:26px;" alt="Foundation" />
      <img src="../assets/logo-brandmark-dark.png" style="max-height:36px;" alt="Foundation brandmark" />
    </div>
  </div></body></html>
