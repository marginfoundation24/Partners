<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:transparent;color:var(--site-fg);}
  body{padding:24px;}
  .card{background:#000;border-radius:14px;padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .cell{background:#000;border-radius:10px;padding:12px;display:flex;align-items:center;justify-content:center;height:160px;border:1px solid rgba(255,234,225,.10);}
  .cell img{max-height:140px;max-width:100%;}
</style></head><body>
<div class="card">
  <div class="cell"><img src="../assets/illustrations/g-6t.svg" alt="" /></div>
  <div class="cell"><img src="../assets/illustrations/g-7t.svg" alt="" /></div>
  <div class="cell"><img src="../assets/illustrations/g-8t.svg" alt="" /></div>
  <div class="cell"><img src="../assets/illustrations/g-9t.svg" alt="" /></div>
</div>
</body></html>
