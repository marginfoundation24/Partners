
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:transparent;}
  body{padding:24px;color:var(--fg-1);}
  .card{background:var(--primary-700);border-radius:14px;padding:24px;}
  .card.light{background:var(--neutral-50);color:var(--primary-800);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:12px;}
  .grow{flex:1;}
  .mono{font-family:var(--font-mono);font-size:12px;letter-spacing:-0.01em;}
  .label{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--neutral-300);}
  .swatch{border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;}
  .pad{padding:24px;}
  .grid{display:grid;gap:8px;}
</style></head><body><div class="card"><div class="col" style="gap:14px;">
    <div class="label">Hero color block</div>
    <div style="display:grid;grid-template-columns:60px 1fr 1fr;grid-template-rows:1fr 1fr;height:200px;gap:0;border-radius:14px;overflow:hidden;">
      <div style="background:#246EC9;grid-row:1/3;display:flex;align-items:flex-end;padding:10px;color:#fff;font-size:10px;letter-spacing:.08em;">AZURE</div>
      <div style="background:#DD6052;display:flex;align-items:flex-end;padding:10px;color:#fff;font-size:11px;letter-spacing:.08em;">CORAL · #DD6052</div>
      <div style="background:#82B5E3;display:flex;align-items:flex-end;padding:10px;color:#0e2c50;font-size:11px;letter-spacing:.08em;">SKY · #82B5E3</div>
      <div style="background:#DCD8CB;display:flex;align-items:flex-end;padding:10px;color:#20232B;font-size:11px;letter-spacing:.08em;">BEIGE · #DCD8CB</div>
      <div style="background:#20232B;display:flex;align-items:flex-end;padding:10px;color:#fff;font-size:11px;letter-spacing:.08em;">DARK · #20232B</div>
    </div>
  </div></div></body></html>
