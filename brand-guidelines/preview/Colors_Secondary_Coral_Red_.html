
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:transparent;}
  body{padding:24px;color:var(--fg-1);}
  .card{background:var(--primary-700);border-radius:14px;padding:24px;}
  .card.light{background:var(--neutral-50);color:var(--primary-800);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:12px;}
  .grow{flex:1;}
  .mono{font-family:var(--font-mono);font-size:12px;letter-spacing:-0.01em;}
  .label{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--neutral-300);}
  .swatch{border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;}
  .pad{padding:24px;}
  .grid{display:grid;gap:8px;}
</style></head><body><div class="card"><div class="col" style="gap:14px;">
  <div class="label">Secondary · Coral Red</div>
  <div class="row" style="gap:0;border-radius:12px;overflow:hidden;">
    <div class="swatch" style="background:var(--secondary-800);height:120px;flex:1;border-radius:12px 0 0 12px;">
      <div style="font-size:11px;letter-spacing:0.06em;opacity:.85;text-transform:uppercase;">secondary-800</div>
    </div><div class="swatch" style="background:var(--secondary-700);height:120px;flex:1;">
      <div style="font-size:11px;letter-spacing:0.06em;opacity:.85;text-transform:uppercase;">secondary-700</div>
    </div><div class="swatch" style="background:var(--secondary-600);height:120px;flex:1;">
      <div style="font-size:11px;letter-spacing:0.06em;opacity:.85;text-transform:uppercase;">secondary-600</div>
    </div><div class="swatch" style="background:var(--secondary-500);height:120px;flex:1;">
      <div style="font-size:11px;letter-spacing:0.06em;opacity:.85;text-transform:uppercase;">secondary-500</div>
    </div><div class="swatch" style="background:var(--secondary-400);height:120px;flex:1;">
      <div style="font-size:11px;letter-spacing:0.06em;opacity:.85;text-transform:uppercase;">secondary-400</div>
    </div><div class="swatch" style="background:var(--secondary-300);height:120px;flex:1;">
      <div style="font-size:11px;letter-spacing:0.06em;opacity:.85;text-transform:uppercase;">secondary-300</div>
    </div><div class="swatch" style="background:var(--secondary-200);height:120px;flex:1;border-radius:0 12px 12px 0;">
      <div style="font-size:11px;letter-spacing:0.06em;opacity:.85;text-transform:uppercase;">secondary-200</div>
    </div>
  </div>
</div></div></body></html>
