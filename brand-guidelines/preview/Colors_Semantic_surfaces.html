
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap">
<style>
  html,body{margin:0;background:transparent;color:var(--site-fg);}

      <div style="margin-top:14px;height:1px;background:rgba(255,234,225,0.20);"></div>
      <div class="mono" style="color:rgba(255,234,225,.5);margin-top:8px;font-size:11px;">#000000 · #FFEAE1</div>
    </div>
    <div style="background:var(--primary-800);flex:1;padding:18px;border-radius:14px;color:#fff;height:200px;">

      <div style="font:600 22px var(--font-primary);margin-top:24px;">Navy surface</div>

    </div>
