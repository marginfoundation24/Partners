
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:transparent;}
  body{padding:24px;color:var(--fg-1);}
  .card{background:var(--primary-700);border-radius:14px;padding:24px;}
  .card.light{background:var(--neutral-50);color:var(--primary-800);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:12px;}
  .grow{flex:1;}
  .mono{font-family:var(--font-mono);font-size:12px;letter-spacing:-0.01em;}
  .label{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--neutral-300);}
  .swatch{border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;}
  .pad{padding:24px;}
  .grid{display:grid;gap:8px;}
</style></head><body><div class="card"><div class="col" style="gap:12px;">
    
      <div class="row" style="gap:8px;align-items:center;">
        <div style="width:80px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--neutral-300);">Success</div>
        <div style="background:var(--success-400);height:32px;flex:1;border-radius:6px;"></div><div style="background:var(--success-300);height:32px;flex:1;border-radius:6px;"></div><div style="background:var(--success-200);height:32px;flex:1;border-radius:6px;"></div><div style="background:var(--success-100);height:32px;flex:1;border-radius:6px;"></div><div style="background:var(--success-50);height:32px;flex:1;border-radius:6px;"></div>
      </div>
      <div class="row" style="gap:8px;align-items:center;">
        <div style="width:80px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--neutral-300);">Info</div>
        <div style="background:var(--info-400);height:32px;flex:1;border-radius:6px;"></div><div style="background:var(--info-300);height:32px;flex:1;border-radius:6px;"></div><div style="background:var(--info-200);height:32px;flex:1;border-radius:6px;"></div><div style="background:var(--info-100);height:32px;flex:1;border-radius:6px;"></div><div style="background:var(--info-50);height:32px;flex:1;border-radius:6px;"></div>
      </div>
      <div class="row" style="gap:8px;align-items:center;">
        <div style="width:80px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--neutral-300);">Warning</div>
        <div style="background:var(--warning-400);height:32px;flex:1;border-radius:6px;"></div><div style="background:var(--warning-300);height:32px;flex:1;border-radius:6px;"></div><div style="background:var(--warning-200);height:32px;flex:1;border-radius:6px;"></div><div style="background:var(--warning-100);height:32px;flex:1;border-radius:6px;"></div><div style="background:var(--warning-50);height:32px;flex:1;border-radius:6px;"></div>
      </div>
      <div class="row" style="gap:8px;align-items:center;">
        <div style="width:80px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--neutral-300);">Danger</div>
        <div style="background:var(--danger-400);height:32px;flex:1;border-radius:6px;"></div><div style="background:var(--danger-300);height:32px;flex:1;border-radius:6px;"></div><div style="background:var(--danger-200);height:32px;flex:1;border-radius:6px;"></div><div style="background:var(--danger-100);height:32px;flex:1;border-radius:6px;"></div><div style="background:var(--danger-50);height:32px;flex:1;border-radius:6px;"></div>
      </div>
  </div></div></body></html>
