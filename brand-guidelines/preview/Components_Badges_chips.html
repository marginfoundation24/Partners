
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:transparent;}
  body{padding:24px;color:var(--fg-1);}
  .card{background:var(--primary-700);border-radius:14px;padding:24px;}
  .card.light{background:var(--neutral-50);color:var(--primary-800);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:12px;}
  .grow{flex:1;}
  .mono{font-family:var(--font-mono);font-size:12px;letter-spacing:-0.01em;}
  .label{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--neutral-300);}
  .swatch{border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;}
  .pad{padding:24px;}
  .grid{display:grid;gap:8px;}
</style></head><body><div class="card"><div class="col" style="gap:14px;">
    <div class="row" style="gap:10px;flex-wrap:wrap;">
      <span style="display:inline-flex;align-items:center;gap:6px;background:rgba(36,110,201,0.18);color:var(--primary-300);font:600 11px var(--font-primary);letter-spacing:0.16em;text-transform:uppercase;padding:6px 12px;border-radius:999px;">Brand Guidelines</span>
      <span style="display:inline-flex;align-items:center;gap:6px;background:rgba(221,96,82,0.18);color:var(--secondary-400);font:600 11px var(--font-primary);letter-spacing:0.16em;text-transform:uppercase;padding:6px 12px;border-radius:999px;">New</span>
      <span style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.06);color:var(--neutral-200);font:500 12px var(--font-primary);padding:6px 12px;border-radius:6px;">Content Strategy</span>
      <span style="display:inline-flex;align-items:center;gap:6px;background:rgba(0,150,73,0.18);color:var(--success-200);font:500 12px var(--font-primary);padding:6px 12px;border-radius:6px;"><span style="width:6px;height:6px;border-radius:999px;background:var(--success-300);"></span>Live</span>
    </div>
    <div class="row" style="gap:10px;flex-wrap:wrap;">
      <span style="background:#fff;color:var(--primary-800);font:600 11px var(--font-primary);letter-spacing:0.16em;text-transform:uppercase;padding:6px 12px;border-radius:999px;">Foundation</span>
      <span style="background:var(--primary-500);color:#fff;font:600 11px var(--font-primary);letter-spacing:0.16em;text-transform:uppercase;padding:6px 12px;border-radius:999px;">B2B</span>
      <span style="background:var(--color-beige);color:var(--primary-800);font:600 11px var(--font-primary);letter-spacing:0.16em;text-transform:uppercase;padding:6px 12px;border-radius:999px;">Q3 Campaign</span>
    </div>
  </div></div></body></html>
