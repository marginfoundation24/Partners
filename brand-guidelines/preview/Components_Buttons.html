
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap">
<style>
  html,body{margin:0;background:transparent;color:var(--site-fg);}
  body{padding:24px;}
  .card{background:#0a0a0a;border-radius:14px;padding:24px;color:var(--site-fg);}
  .card.beige{background:var(--color-beige);color:var(--primary-800);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:12px;}
  .grow{flex:1;}
  .mono{font-family:var(--font-mono);font-size:12px;letter-spacing:-0.01em;}
  .label{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--secondary-500);}
</style></head><body><div class="card"><div class="col" style="gap:18px;">
    <div class="row" style="gap:12px;flex-wrap:wrap;">
      <button style="background:var(--secondary-500);color:#fff;border:none;border-radius:6px;padding:14px 24px;font:600 13px/1 var(--font-primary);letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;">Book A Call</button>
      <button style="background:var(--secondary-500);color:#fff;border:none;border-radius:6px;padding:18px 32px;font:600 14px/1 var(--font-primary);letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;">Book Intro Call</button>
      <button style="background:transparent;color:var(--site-fg);border:1px solid rgba(255,234,225,.20);border-radius:999px;padding:14px 24px;font:600 13px/1 var(--font-primary);letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;">Ghost</button>
    </div>
    <div class="row" style="gap:18px;flex-wrap:wrap;align-items:center;">
      <a style="color:var(--site-fg);font:500 14px var(--font-primary);text-decoration:none;">Read more →</a>
      <a style="color:var(--secondary-500);font:500 14px var(--font-primary);text-decoration:none;">Browse case studies →</a>
      <button style="background:rgba(255,234,225,0.06);color:var(--site-fg);border:none;border-radius:8px;padding:10px 14px;font:500 13px var(--font-primary);cursor:pointer;">Inline ghost</button>
    </div>
  </div></div></body></html>
