
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:transparent;}
  body{padding:24px;color:var(--fg-1);}

  .grid{display:grid;gap:8px;}

      <div style="font:700 22px var(--font-primary);margin-top:10px;">Strategy & Planning</div>
      <div style="font:400 14px/150% var(--font-primary);color:var(--neutral-200);margin-top:8px;">Research-led editorial strategy for B2B brands ready to ship.</div>
    </div>
    <div style="flex:1;background:var(--neutral-50);border-radius:12px;padding:24px;color:var(--primary-800);box-shadow:0 8px 24px rgba(7,26,49,0.18);">
      <div class="label" style="color:var(--neutral-400);">Case study</div>
      <div style="font:700 22px var(--font-primary);margin-top:10px;color:var(--primary-800);">Cisco Talos</div>
      <div style="font:400 14px/150% var(--font-primary);color:var(--neutral-500);margin-top:8px;">3.2× organic reach in two quarters. Read the playbook →</div>
