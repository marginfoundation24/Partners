
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:transparent;}
  body{padding:24px;color:var(--fg-1);}
  .card{background:var(--primary-700);border-radius:14px;padding:24px;}
  .card.light{background:var(--neutral-50);color:var(--primary-800);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:12px;}
  .grow{flex:1;}
  .mono{font-family:var(--font-mono);font-size:12px;letter-spacing:-0.01em;}
  .label{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--neutral-300);}
  .swatch{border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;}
  .pad{padding:24px;}
  .grid{display:grid;gap:8px;}
</style></head><body><div class="card"><div class="col" style="gap:14px;">
    <div style="position:relative;">
      <svg style="position:absolute;left:14px;top:50%;transform:translateY(-50%);" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
      <input value="" placeholder="Search colors, typography, mission" style="width:100%;height:48px;background:rgba(255,255,255,0.16);border:none;border-radius:10px;padding:0 14px 0 40px;color:#fff;font:400 16px var(--font-primary);" />
    </div>
    <input value="Engaged" style="width:100%;height:48px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.16);border-radius:10px;padding:0 14px;color:#fff;font:400 16px var(--font-primary);" />
    <input value="Focus state" style="width:100%;height:48px;background:rgba(255,255,255,0.16);border:1px solid var(--primary-500);outline:2px solid rgba(36,110,201,0.2);border-radius:10px;padding:0 14px;color:#fff;font:400 16px var(--font-primary);" />
  </div></div></body></html>
