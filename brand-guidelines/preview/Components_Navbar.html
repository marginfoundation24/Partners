
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap">
<style>
  html,body{margin:0;background:transparent;color:var(--site-fg);}
  body{padding:24px;}
  .card{background:#0a0a0a;border-radius:14px;padding:24px;color:var(--site-fg);}
  .card.beige{background:var(--color-beige);color:var(--primary-800);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:12px;}
  .grow{flex:1;}
  .mono{font-family:var(--font-mono);font-size:12px;letter-spacing:-0.01em;}
  .label{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--secondary-500);}
</style></head><body><style>
    .wm{display:inline-flex;align-items:center;color:#FFEAE1;font:800 20px var(--font-primary);letter-spacing:.04em;line-height:1;}
    .wm-b{width:7px;height:28px;background:currentColor;position:relative;}
    .wm-b::before,.wm-b::after{content:'';position:absolute;height:3px;background:currentColor;width:11px;}
    .wm-bl::before{top:0;left:0;} .wm-bl::after{bottom:0;left:0;}
    .wm-br::before{top:0;right:0;} .wm-br::after{bottom:0;right:0;}
    .wm-t{padding:0 4px;}
  </style>
  <div style="background:#000;border-radius:12px;padding:14px 22px;display:flex;align-items:center;gap:24px;">
    <span class="wm"><span class="wm-b wm-bl"></span><span class="wm-t">FOUNDATION</span><span class="wm-b wm-br"></span></span>
    <div style="display:flex;gap:22px;flex:1;color:#FFEAE1;">
      <span style="font:500 14px var(--font-primary);">Industries ▾</span>
      <span style="font:500 14px var(--font-primary);">Services ▾</span>
      <span style="font:500 14px var(--font-primary);">Key Insights ▾</span>
    </div>
    <button style="background:var(--secondary-500);color:#fff;border:none;border-radius:6px;padding:10px 18px;font:600 12px var(--font-primary);letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;">Book A Call</button>
    <div style="display:flex;align-items:center;gap:8px;background:rgba(255,234,225,.04);border:1px solid rgba(255,234,225,.20);padding:8px 14px;border-radius:999px;width:170px;color:rgba(255,234,225,.5);font:400 13px var(--font-primary);">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
      <span>Search…</span>
    </div>
  </div></body></html>
