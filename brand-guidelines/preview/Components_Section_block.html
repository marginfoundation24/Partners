
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:transparent;}
  body{padding:24px;color:var(--fg-1);}
  .card{background:var(--primary-700);border-radius:14px;padding:24px;}
  .card.light{background:var(--neutral-50);color:var(--primary-800);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:12px;}
  .grow{flex:1;}
  .mono{font-family:var(--font-mono);font-size:12px;letter-spacing:-0.01em;}
  .label{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--neutral-300);}
  .swatch{border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;}
  .pad{padding:24px;}
  .grid{display:grid;gap:8px;}
</style></head><body><div class="card"><div style="display:grid;grid-template-columns:35% 15% 50%;gap:0;">
    <div>
      <div style="font:500 12px/140% var(--font-primary);letter-spacing:0.18em;text-transform:uppercase;color:var(--primary-300);margin-bottom:14px;">Visual Identity</div>
      <div style="font:700 36px/110% var(--font-primary);">Color</div>
      <div style="font:400 14px/150% var(--font-primary);color:var(--neutral-200);margin-top:10px;">A balanced, trustworthy, approachable palette.</div>
    </div>
    <div></div>
    <div>
      <div style="background:var(--primary-500);height:160px;border-radius:12px;display:flex;align-items:flex-end;padding:14px;color:#fff;font:500 12px var(--font-primary);letter-spacing:0.08em;text-transform:uppercase;">Azure Blue · #246EC9</div>
      <div style="font:400 13px/150% var(--font-primary);color:var(--neutral-300);margin-top:14px;">Primary 500. Used for buttons, links, and one-block hero accents.</div>
    </div>
  </div></div></body></html>
