
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:transparent;}
  body{padding:24px;color:var(--fg-1);}
  .card{background:var(--primary-700);border-radius:14px;padding:24px;}
  .card.light{background:var(--neutral-50);color:var(--primary-800);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:12px;}
  .grow{flex:1;}
  .mono{font-family:var(--font-mono);font-size:12px;letter-spacing:-0.01em;}
  .label{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--neutral-300);}
  .swatch{border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;}
  .pad{padding:24px;}
  .grid{display:grid;gap:8px;}
</style></head><body><div class="card light" style="background:#f6f4ee;padding:32px;">
  <div class="row" style="gap:20px;">
    <div style="flex:1;">
      <div style="background:#fff;height:100px;border-radius:12px;"></div>
      <div class="mono" style="margin-top:10px;color:var(--neutral-500);font-size:11px;">flat (default)</div>
    </div>
    <div style="flex:1;">
      <div style="background:#fff;height:100px;border-radius:12px;box-shadow:0 8px 24px rgba(7,26,49,0.18), 0 1px 2px rgba(7,26,49,0.12);"></div>
      <div class="mono" style="margin-top:10px;color:var(--neutral-500);font-size:11px;">shadow-card</div>
    </div>
    <div style="flex:1;">
      <div style="background:#fff;height:100px;border-radius:12px;box-shadow:0 24px 48px rgba(7,26,49,0.28), 0 2px 4px rgba(7,26,49,0.14);"></div>
      <div class="mono" style="margin-top:10px;color:var(--neutral-500);font-size:11px;">shadow-pop</div>
    </div>
  </div>
</div></body></html>
