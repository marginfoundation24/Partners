
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:transparent;}
  body{padding:24px;color:var(--fg-1);}
  .card{background:var(--primary-700);border-radius:14px;padding:24px;}
  .card.light{background:var(--neutral-50);color:var(--primary-800);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:12px;}
  .grow{flex:1;}
  .mono{font-family:var(--font-mono);font-size:12px;letter-spacing:-0.01em;}
  .label{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--neutral-300);}
  .swatch{border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;}
  .pad{padding:24px;}
  .grid{display:grid;gap:8px;}
</style></head><body><div class="card"><div class="col" style="gap:12px;">
  <div class="label">Durations</div>
  <div class="row" style="gap:12px;">
    
      <div style="flex:1;background:rgba(255,255,255,0.04);border-radius:10px;padding:12px;">
        <div class="mono" style="color:var(--primary-300);">fast</div>
        <div class="mono" style="color:var(--neutral-200);font-size:18px;margin-top:4px;">140ms</div>
      </div>
      <div style="flex:1;background:rgba(255,255,255,0.04);border-radius:10px;padding:12px;">
        <div class="mono" style="color:var(--primary-300);">base</div>
        <div class="mono" style="color:var(--neutral-200);font-size:18px;margin-top:4px;">220ms</div>
      </div>
      <div style="flex:1;background:rgba(255,255,255,0.04);border-radius:10px;padding:12px;">
        <div class="mono" style="color:var(--primary-300);">slow</div>
        <div class="mono" style="color:var(--neutral-200);font-size:18px;margin-top:4px;">420ms</div>
      </div>
      <div style="flex:1;background:rgba(255,255,255,0.04);border-radius:10px;padding:12px;">
        <div class="mono" style="color:var(--primary-300);">hero</div>
        <div class="mono" style="color:var(--neutral-200);font-size:18px;margin-top:4px;">600ms</div>
      </div>
  </div>
  <div class="label" style="margin-top:6px;">Easings</div>
  <div class="row" style="gap:12px;">
    <div style="flex:1;background:rgba(255,255,255,0.04);border-radius:10px;padding:10px;">
      <div class="mono" style="color:var(--primary-300);">--ease-out-quint</div>
      <div class="mono" style="color:var(--neutral-300);font-size:11px;">cubic-bezier(.22, 1, .36, 1)</div>
    </div>
    <div style="flex:1;background:rgba(255,255,255,0.04);border-radius:10px;padding:10px;">
      <div class="mono" style="color:var(--primary-300);">--ease-standard</div>
      <div class="mono" style="color:var(--neutral-300);font-size:11px;">cubic-bezier(.4, 0, .2, 1)</div>
    </div>
  </div>
</div></div></body></html>
