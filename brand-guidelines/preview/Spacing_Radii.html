
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:transparent;}
  body{padding:24px;color:var(--fg-1);}
  .card{background:var(--primary-700);border-radius:14px;padding:24px;}
  .card.light{background:var(--neutral-50);color:var(--primary-800);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:12px;}
  .grow{flex:1;}
  .mono{font-family:var(--font-mono);font-size:12px;letter-spacing:-0.01em;}
  .label{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--neutral-300);}
  .swatch{border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;}
  .pad{padding:24px;}
  .grid{display:grid;gap:8px;}
</style></head><body><div class="card"><div class="row" style="gap:16px;align-items:flex-end;">
  
    <div class="col" style="gap:8px;align-items:center;">
      <div style="width:72px;height:72px;background:var(--primary-500);border-radius:4px;"></div>
      <div class="mono" style="color:var(--neutral-300);">xs</div>
      <div class="mono" style="color:var(--neutral-400);font-size:11px;">4px</div>
    </div>
    <div class="col" style="gap:8px;align-items:center;">
      <div style="width:72px;height:72px;background:var(--primary-500);border-radius:6px;"></div>
      <div class="mono" style="color:var(--neutral-300);">sm</div>
      <div class="mono" style="color:var(--neutral-400);font-size:11px;">6px</div>
    </div>
    <div class="col" style="gap:8px;align-items:center;">
      <div style="width:72px;height:72px;background:var(--primary-500);border-radius:10px;"></div>
      <div class="mono" style="color:var(--neutral-300);">md</div>
      <div class="mono" style="color:var(--neutral-400);font-size:11px;">10px</div>
    </div>
    <div class="col" style="gap:8px;align-items:center;">
      <div style="width:72px;height:72px;background:var(--primary-500);border-radius:12px;"></div>
      <div class="mono" style="color:var(--neutral-300);">lg</div>
      <div class="mono" style="color:var(--neutral-400);font-size:11px;">12px</div>
    </div>
    <div class="col" style="gap:8px;align-items:center;">
      <div style="width:72px;height:72px;background:var(--primary-500);border-radius:20px;"></div>
      <div class="mono" style="color:var(--neutral-300);">xl</div>
      <div class="mono" style="color:var(--neutral-400);font-size:11px;">20px</div>
    </div>
    <div class="col" style="gap:8px;align-items:center;">
      <div style="width:72px;height:72px;background:var(--primary-500);border-radius:999px;"></div>
      <div class="mono" style="color:var(--neutral-300);">pill</div>
      <div class="mono" style="color:var(--neutral-400);font-size:11px;">999</div>
    </div>
</div></div></body></html>
