
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:transparent;}
  body{padding:24px;color:var(--fg-1);}
  .card{background:var(--primary-700);border-radius:14px;padding:24px;}
  .card.light{background:var(--neutral-50);color:var(--primary-800);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:12px;}
  .grow{flex:1;}
  .mono{font-family:var(--font-mono);font-size:12px;letter-spacing:-0.01em;}
  .label{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--neutral-300);}
  .swatch{border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;}
  .pad{padding:24px;}
  .grid{display:grid;gap:8px;}
</style></head><body><div class="card">
  <div class="col" style="gap:10px;">
    <div class="label">Deck body · Barlow</div>
    <div style="font:600 24px/130% var(--font-body-deck);">Barlow Semibold 24</div>
    <div style="font:400 18px/150% var(--font-body-deck);">Barlow Regular 18 — clean, geometric, approachable. Reads cleanly in long-form proposals and slides where Fjalla One handles the headlines.</div>
    <div style="font:400 14px/140% var(--font-body-deck);color:var(--neutral-300);">Barlow 14 / caption — used for footnotes, source attributions, and figure labels.</div>
  </div>
</div></body></html>
