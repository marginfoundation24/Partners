
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:transparent;}
  body{padding:24px;color:var(--fg-1);}
  .card{background:var(--primary-700);border-radius:14px;padding:24px;}
  .card.light{background:var(--neutral-50);color:var(--primary-800);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:12px;}
  .grow{flex:1;}
  .mono{font-family:var(--font-mono);font-size:12px;letter-spacing:-0.01em;}
  .label{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--neutral-300);}
  .swatch{border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;}
  .pad{padding:24px;}
  .grid{display:grid;gap:8px;}
</style></head><body><div class="card">
  <div class="col" style="gap:20px;">
    <div style="font:500 13px/140% var(--font-primary);letter-spacing:0.18em;text-transform:uppercase;color:var(--primary-300);">Brand Guidelines</div>
    <div style="font:500 13px/140% var(--font-primary);letter-spacing:0.18em;text-transform:uppercase;color:var(--secondary-500);">Visual Identity</div>
    <div style="font:600 14px/140% var(--font-primary);letter-spacing:0.05em;text-transform:uppercase;color:var(--neutral-50);">Explore Library →</div>
    <div style="font:400 12px/140% var(--font-primary);letter-spacing:0.04em;color:var(--neutral-400);text-transform:uppercase;">Aug · 2025 · Foundation Marketing</div>
  </div>
</div></body></html>
