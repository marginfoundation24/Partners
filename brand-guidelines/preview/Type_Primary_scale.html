
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:transparent;}
  body{padding:24px;color:var(--fg-1);}
  .card{background:var(--primary-700);border-radius:14px;padding:24px;}
  .card.light{background:var(--neutral-50);color:var(--primary-800);}
  .row{display:flex;gap:12px;align-items:center;}
  .col{display:flex;flex-direction:column;gap:12px;}
  .grow{flex:1;}
  .mono{font-family:var(--font-mono);font-size:12px;letter-spacing:-0.01em;}
  .label{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--neutral-300);}
  .swatch{border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;}
  .pad{padding:24px;}
  .grid{display:grid;gap:8px;}
</style></head><body><div class="card">
  <div class="col" style="gap:14px;">
    <div style="font:700 56px/100% var(--font-primary);letter-spacing:-0.01em;">Heading 01 — 56/110</div>
    <div style="font:700 44px/110% var(--font-primary);letter-spacing:-0.005em;">Heading 03 — 44/120</div>
    <div style="font:700 32px/110% var(--font-primary);">Heading 05 — 32/120</div>
    <div style="font:600 22px/120% var(--font-primary);">Heading 07 — 22/130</div>
    <div style="font:400 18px/140% var(--font-primary);color:var(--neutral-200);">Paragraph 03 — 18/140 — body text default on dark surfaces. The quick brown fox jumps over the lazy dog.</div>
  </div>
</div></body></html>
