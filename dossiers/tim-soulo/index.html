<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">
<title>Tim Soulo · Partner Dossier · Foundation</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap">
<style>
  :root {
    --bg: #FAF9F5;
    --ink: #141413;
    --accent: #C96442;
    --muted: #87867F;
    --soft: #D9D8D3;
    --card: #FFFFFF;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif; }
  body { -webkit-font-smoothing: antialiased; line-height: 1.5; }
  .container { max-width: 720px; margin: 0 auto; padding: 56px 24px; }
  .eyebrow { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  h1.partner-name { font-size: 36px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.01em; }
  .subtitle { font-size: 17px; color: var(--muted); margin: 0 0 24px; }
  .links { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
  .links a { color: var(--accent); text-decoration: none; }
  .links a:hover { text-decoration: underline; }
  .score-badge { display: inline-block; padding: 6px 12px; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid var(--ink); border-radius: 0; margin-bottom: 32px; }
  .score-badge.tier-a { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .score-badge.tier-b { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .score-badge.tier-c, .score-badge.tier-d { background: transparent; color: var(--ink); }
  hr { border: none; border-top: 1px solid var(--soft); margin: 32px 0; }
  .dossier { font-size: 16px; }
  .dossier h1, .dossier h2, .dossier h3 { font-weight: 600; letter-spacing: -0.01em; margin-top: 32px; margin-bottom: 12px; }
  .dossier h1 { font-size: 24px; }
  .dossier h2 { font-size: 20px; }
  .dossier h3 { font-size: 17px; color: var(--accent); }
  .dossier p { margin: 0 0 16px; }
  .dossier strong { color: var(--accent); font-weight: 600; }
  .dossier a { color: var(--accent); }
  .dossier ul { padding-left: 20px; margin: 0 0 16px; }
  .dossier li { margin-bottom: 6px; }
  .dossier code { background: var(--soft); padding: 2px 5px; font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 14px; }
  .footer { margin-top: 64px; font-size: 12px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="container">
    <div class="eyebrow">Foundation Partner Dossier</div>
    <h1 class="partner-name">Tim Soulo</h1>
    <p class="subtitle">CMO · Ahrefs</p>
    <div class="links"><a class="link" href="https://www.linkedin.com/in/timsoulo" target="_blank" rel="noopener">LinkedIn</a> · <a class="link" href="https://ahrefs.com" target="_blank" rel="noopener">Website</a> · <a class="link" href="mailto:timsoulo@ahrefs.com">timsoulo@ahrefs.com</a></div>
    <span class="score-badge tier-a">IPP 93 · Tier A</span>
    <hr>
    <div class="dossier"><p>Dossier generation failed. Manual research recommended.</p></div>
    <div class="footer">Foundation · Partner Discovery</div>
  </div>
</body>
</html>
